<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SDK Supabase via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Nos clés Supabase (fichier local protégé par .gitignore) -->
    <script src="config.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Accès Admin</h1>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" class="w-full p-2 border border-gray-300 rounded mt-1" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Mot de passe</label>
                <input type="password" id="password" class="w-full p-2 border border-gray-300 rounded mt-1" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                Se connecter
            </button>
        </form>

        <p id="error-message" class="text-red-500 text-sm mt-4 hidden"></p>
    </div>

    <script>
        // 1. INITIALISATION SUPABASE
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. SI L'UTILISATEUR EST DÉJÀ CONNECTÉ → aller directement au dashboard
        // getSession() vérifie si une session existe déjà dans le navigateur
        db.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'dashboard.html';
            }
        });

        // 3. SOUMISSION DU FORMULAIRE DE CONNEXION
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // signInWithPassword est la méthode Supabase équivalente à signInWithEmailAndPassword de Firebase
            const { error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                errorMsg.textContent = "Erreur : " + error.message;
                errorMsg.classList.remove('hidden');
            } else {
                // Connexion réussie → redirection vers le dashboard
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
